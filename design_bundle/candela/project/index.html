<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Los Candela — Chicha Psicodélica</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Caveat:wght@600;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300;1,400&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<style>
  :root {
    --bg: #0D0904;
    --gold: #D4A017;
    --orange: #E8601C;
    --red: #C2321A;
    --teal: #2A9B7A;
    --cream: #F0E6C8;
    --purple: #8B3FA8;
    --dark2: #1A1208;
    --dark3: #221A08;
    --muted: rgba(240,230,200,0.4);
    --muted2: rgba(240,230,200,0.55);
    --muted3: rgba(240,230,200,0.7);
    --cursor-blend: screen;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--cream);
    font-family: 'DM Sans', sans-serif;
    overflow-x: hidden;
    cursor: none;
  }

  /* Custom cursor */
  #cursor {
    position: fixed;
    width: 12px; height: 12px;
    background: var(--gold);
    border-radius: 50%;
    pointer-events: none;
    z-index: 9999;
    transition: transform 0.1s ease, background 0.3s ease;
    mix-blend-mode: var(--cursor-blend);
  }
  #cursor-ring {
    position: fixed;
    width: 36px; height: 36px;
    border: 1.5px solid var(--gold);
    border-radius: 50%;
    pointer-events: none;
    z-index: 9998;
    transition: transform 0.18s ease, border-color 0.3s ease;
    mix-blend-mode: var(--cursor-blend);
  }

  /* Zigzag SVG pattern used as section divider */
  .zigzag-divider {
    width: 100%;
    overflow: hidden;
    line-height: 0;
  }

  @keyframes shimmer {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.7; }
  }
  @keyframes psychedelic-hue {
    0%   { filter: hue-rotate(0deg) brightness(1); }
    25%  { filter: hue-rotate(20deg) brightness(1.05); }
    50%  { filter: hue-rotate(-15deg) brightness(0.95); }
    75%  { filter: hue-rotate(30deg) brightness(1.08); }
    100% { filter: hue-rotate(0deg) brightness(1); }
  }
  @keyframes float {
    0%, 100% { transform: translateY(0px); }
    50% { transform: translateY(-14px); }
  }
  @keyframes zigzag-slide {
    0% { transform: translateX(0); }
    100% { transform: translateX(-50%); }
  }
  @keyframes pulse-glow {
    0%, 100% { box-shadow: 0 0 20px 4px rgba(212,160,23,0.3); }
    50% { box-shadow: 0 0 50px 12px rgba(232,96,28,0.5); }
  }
  @keyframes reveal-up {
    from { opacity: 0; transform: translateY(40px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes spin-slow {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }
  @keyframes flicker {
    0%, 19%, 21%, 23%, 25%, 54%, 56%, 100% { opacity: 1; }
    20%, 24%, 55% { opacity: 0.4; }
  }
  @keyframes marquee {
    from { transform: translateX(0); }
    to { transform: translateX(-50%); }
  }
  @keyframes particle-drift {
    0% { transform: translateY(0) translateX(0) scale(1); opacity: 0.8; }
    100% { transform: translateY(-120vh) translateX(var(--dx)) scale(0.2); opacity: 0; }
  }

  /* NAV */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    padding: 1.2rem 2.5rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    transition: background 0.4s, backdrop-filter 0.4s;
  }
  nav.scrolled {
    background: rgba(13,9,4,0.92);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(212,160,23,0.2);
    transition: background 0.4s;
  }
  [data-theme="day"] nav.scrolled {
    background: rgba(255,248,237,0.95);
    border-bottom-color: rgba(155,110,0,0.2);
  }
  .nav-logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.5rem;
    letter-spacing: 0.1em;
    color: var(--gold);
    text-decoration: none;
  }
  .nav-logo span { color: var(--cream); font-family: 'Caveat', cursive; font-size: 1rem; display: block; line-height: 0.8; }
  .nav-links { display: flex; gap: 2rem; list-style: none; }
  .nav-links a {
    color: var(--cream);
    text-decoration: none;
    font-size: 0.78rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    opacity: 0.75;
    transition: opacity 0.2s, color 0.2s;
  }
  .nav-links a:hover { opacity: 1; color: var(--gold); }

  /* HERO */
  .hero {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
    background: radial-gradient(ellipse at 50% 60%, #2a1800 0%, #0D0904 65%);
  }
  .hero-particles { position: absolute; inset: 0; pointer-events: none; }
  .particle {
    position: absolute;
    border-radius: 50%;
    animation: particle-drift linear infinite;
  }
  .hero-content {
    position: relative;
    z-index: 2;
    text-align: center;
    width: 100%;
    max-width: 900px;
    padding: 0 2rem;
  }
  .hero-los {
    font-family: 'Caveat', cursive;
    font-size: clamp(2rem, 5vw, 4rem);
    color: var(--gold);
    display: block;
    letter-spacing: 0.05em;
    margin-bottom: -0.5rem;
    animation: float 5s ease-in-out infinite;
  }
  .hero-candela {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(2rem, 6vw, 6rem);
    white-space: nowrap;
    overflow: visible;
    padding-right: 0.5em;
    line-height: 0.85;
    letter-spacing: -0.01em;
    background: linear-gradient(135deg, var(--gold) 0%, var(--orange) 40%, var(--red) 80%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: psychedelic-hue 8s ease-in-out infinite;
    text-shadow: none;
    display: block;
  }
  .hero-sub {
    font-family: 'Caveat', cursive;
    font-size: clamp(1.1rem, 3vw, 2rem);
    color: var(--teal);
    letter-spacing: 0.1em;
    margin-top: 0.5rem;
    animation: flicker 6s ease-in-out infinite;
  }
  .hero-location {
    font-size: 0.72rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: rgba(240,230,200,0.4);
    margin-top: 1.5rem;
  }
  .hero-cta-group {
    display: flex;
    gap: 1.2rem;
    justify-content: center;
    margin-top: 3rem;
  }
  .btn {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1rem;
    letter-spacing: 0.15em;
    padding: 0.85rem 2.2rem;
    white-space: nowrap;
    border: none;
    cursor: none;
    text-decoration: none;
    display: inline-block;
    transition: transform 0.15s, box-shadow 0.2s;
    clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
  }
  .btn:hover { transform: translateY(-3px); }
  .btn-primary {
    background: linear-gradient(135deg, var(--gold), var(--orange));
    color: #0D0904;
    animation: pulse-glow 3s ease-in-out infinite;
  }
  .btn-outline {
    background: transparent;
    color: var(--cream);
    border: 1.5px solid rgba(240,230,200,0.3);
  }
  .btn-outline:hover { border-color: var(--gold); color: var(--gold); }

  /* Animated zigzag runner */
  .zz-runner {
    width: 100%;
    overflow: hidden;
    height: 24px;
    position: relative;
  }
  .zz-runner-inner {
    display: flex;
    width: 200%;
    animation: marquee 8s linear infinite;
  }

  /* SECTIONS */
  section { padding: 6rem 2rem; }
  .section-label {
    font-size: 0.68rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 0.8rem;
  }
  .section-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(2.5rem, 7vw, 5.5rem);
    line-height: 0.9;
    letter-spacing: 0.03em;
    color: var(--cream);
  }
  .section-title span { color: var(--orange); }
  .max-w { max-width: 1100px; margin: 0 auto; }

  /* ABOUT */
  .about-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 5rem;
    align-items: center;
    margin-top: 4rem;
  }
  .about-text p {
    font-size: 1.05rem;
    line-height: 1.8;
    color: var(--muted3);
    margin-bottom: 1.2rem;
  }
  .about-text p strong { color: var(--cream); font-weight: 500; }
  .about-visual {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .sun-graphic {
    width: 260px;
    height: 260px;
    position: relative;
    animation: spin-slow 20s linear infinite;
  }
  .sun-inner {
    position: absolute;
    inset: 30px;
    border-radius: 50%;
    background: radial-gradient(circle, var(--gold) 30%, var(--orange) 70%, var(--red) 100%);
    animation: psychedelic-hue 5s ease-in-out infinite;
  }

  /* SHOWS */
  .shows-bg {
    background: var(--dark2);
    position: relative;
  }
  .shows-grid {
    display: flex;
    flex-direction: column;
    gap: 0;
    margin-top: 3rem;
  }
  .show-row {
    display: grid;
    grid-template-columns: 120px 1fr auto;
    align-items: center;
    gap: 2rem;
    padding: 1.6rem 0;
    border-bottom: 1px solid rgba(128,100,50,0.12);
    transition: background 0.2s, padding-left 0.2s;
    cursor: none;
    position: relative;
    overflow: hidden;
  }
  .show-row::before {
    content: '';
    position: absolute;
    left: -100%;
    top: 0; bottom: 0;
    width: 100%;
    background: linear-gradient(90deg, transparent, rgba(212,160,23,0.06), transparent);
    transition: left 0.4s;
  }
  .show-row:hover::before { left: 100%; }
  .show-row:hover { padding-left: 1rem; }
  .show-date {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.1rem;
    letter-spacing: 0.08em;
    color: var(--gold);
    line-height: 1.2;
  }
  .show-date span { display: block; font-size: 0.75rem; letter-spacing: 0.15em; color: var(--muted); font-family: 'DM Sans', sans-serif; }
  .show-info h3 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.4rem;
    letter-spacing: 0.05em;
    color: var(--cream);
  }
  .show-info p { font-size: 0.82rem; color: var(--muted2); margin-top: 0.2rem; }
  .show-tag {
    font-size: 0.68rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    padding: 0.3rem 0.9rem;
    border: 1px solid;
    clip-path: polygon(6px 0%, 100% 0%, calc(100% - 6px) 100%, 0% 100%);
  }
  .tag-sold { border-color: var(--red); color: var(--red); }
  .tag-tickets { border-color: var(--teal); color: var(--teal); cursor: none; }
  .tag-tickets:hover { background: var(--teal); color: var(--bg); }

  /* SOUND */
  .sound-section {
    background: linear-gradient(180deg, #0D0904 0%, #150E05 50%, #0D0904 100%);
    position: relative;
    overflow: hidden;
  }
  .sound-orbs {
    position: absolute;
    inset: 0;
    pointer-events: none;
  }
  .orb {
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.12;
    animation: float ease-in-out infinite;
  }
  .sound-content { position: relative; z-index: 2; }
  .sound-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 2px;
    margin-top: 4rem;
  }
  .sound-card {
    background: var(--dark2);
    padding: 2.5rem 2rem;
    transition: background 0.3s, transform 0.3s;
    cursor: none;
    position: relative;
    overflow: hidden;
  }
  .sound-card::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0;
    height: 3px;
    width: 0%;
    background: linear-gradient(90deg, var(--gold), var(--orange));
    transition: width 0.4s ease;
  }
  .sound-card:hover::after { width: 100%; }
  .sound-card:hover { background: #221A08; transform: translateY(-4px); }
  .sound-card-icon {
    font-size: 2.5rem;
    margin-bottom: 1rem;
    display: block;
    animation: float 4s ease-in-out infinite;
  }
  .sound-card h3 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.8rem;
    letter-spacing: 0.05em;
    color: var(--gold);
    margin-bottom: 0.6rem;
  }
  .sound-card p {
    font-size: 0.9rem;
    line-height: 1.7;
    color: var(--muted2);
  }

  /* PLAYERS / MEMBERS */
  .members-section { background: var(--dark3); }
  .members-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 1px;
    margin-top: 3rem;
    background: rgba(240,230,200,0.06);
  }
  .member-card {
    background: var(--dark3);
    padding: 2rem 1.5rem;
    text-align: center;
    transition: background 0.25s;
    cursor: none;
  }
  .member-card:hover { background: var(--dark2); }
  .member-avatar {
    width: 80px; height: 80px;
    border-radius: 50%;
    margin: 0 auto 1rem;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2rem;
    position: relative;
  }
  .member-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.1rem;
    letter-spacing: 0.08em;
    color: var(--cream);
  }
  .member-role {
    font-size: 0.72rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 0.2rem;
  }

  /* CONTACT */
  .contact-section {
    background: var(--bg);
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .contact-section::before {
    content: 'CANDELA';
    position: absolute;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 25vw;
    color: rgba(212,160,23,0.03);
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
    white-space: nowrap;
  }
  .contact-inner { position: relative; z-index: 2; }
  .contact-email {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(1.5rem, 4vw, 3rem);
    color: var(--gold);
    text-decoration: none;
    letter-spacing: 0.05em;
    transition: color 0.2s;
    display: inline-block;
    margin-top: 2rem;
  }
  .contact-email:hover { color: var(--orange); }

  /* FOOTER */
  footer {
    background: #080503;
    padding: 2rem 2.5rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-top: 1px solid rgba(212,160,23,0.15);
  }
  .footer-logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.3rem;
    color: var(--gold);
    letter-spacing: 0.1em;
  }
  .footer-logo span { font-family: 'Caveat', cursive; font-size: 0.9rem; color: rgba(240,230,200,0.4); display: block; }
  footer p { font-size: 0.7rem; color: rgba(240,230,200,0.25); letter-spacing: 0.1em; }

  /* REVEAL */
  .reveal { opacity: 0; transform: translateY(30px); transition: opacity 0.7s ease, transform 0.7s ease; }
  .reveal.visible { opacity: 1; transform: translateY(0); }

  /* ── DAY THEME ───────────────────────────────────────────── */
  [data-theme="day"] {
    --bg: #FFF8ED;
    --gold: #9B6E00;
    --orange: #C84E0A;
    --red: #A82010;
    --teal: #1A7A5E;
    --cream: #1A0E00;
    --purple: #6E2F8A;
    --dark2: #F5ECD5;
    --dark3: #EDE0C4;
    --muted: rgba(26,14,0,0.4);
    --muted2: rgba(26,14,0,0.55);
    --muted3: rgba(26,14,0,0.7);
    --cursor-blend: multiply;
  }
  [data-theme="day"] body { background: #FFF8ED; color: #1A0E00; }
  [data-theme="day"] .hero {
    background: radial-gradient(ellipse at 50% 60%, #FFE8B0 0%, #FFF8ED 65%);
  }
  [data-theme="day"] .hero-location { color: rgba(26,14,0,0.4); }
  [data-theme="day"] .hero-candela {
    background: linear-gradient(135deg, #9B6E00 0%, #C84E0A 40%, #A82010 80%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  [data-theme="day"] .about-text p { color: rgba(26,14,0,0.7); }
  [data-theme="day"] .about-text p strong { color: #1A0E00; }
  [data-theme="day"] .shows-bg { background: #F5ECD5; }
  [data-theme="day"] .show-row { border-bottom-color: rgba(26,14,0,0.1); }
  [data-theme="day"] .show-info p { color: rgba(26,14,0,0.5); }
  [data-theme="day"] .sound-section { background: linear-gradient(180deg, #FFF8ED 0%, #F5ECD5 50%, #FFF8ED 100%); }
  [data-theme="day"] .sound-card { background: #F5ECD5; }
  [data-theme="day"] .sound-card:hover { background: #EDE0C4; }
  [data-theme="day"] .sound-card p { color: rgba(26,14,0,0.6); }
  [data-theme="day"] .members-section { background: #EDE0C4; }
  [data-theme="day"] .member-card { background: #EDE0C4; }
  [data-theme="day"] .member-card:hover { background: #F5ECD5; }
  [data-theme="day"] .member-role { color: rgba(26,14,0,0.4); }
  [data-theme="day"] .contact-section { background: #FFF8ED; }
  [data-theme="day"] .contact-section::before { color: rgba(155,110,0,0.05); }
  [data-theme="day"] footer { background: #EDE0C4; border-top-color: rgba(155,110,0,0.25); }
  [data-theme="day"] .footer-logo span { color: rgba(26,14,0,0.4); }
  [data-theme="day"] footer p { color: rgba(26,14,0,0.3); }
  [data-theme="day"] .section-title { color: #1A0E00; }
  [data-theme="day"] .nav-links a { color: #1A0E00; }
  [data-theme="day"] nav.scrolled { background: rgba(255,248,237,0.92); border-bottom-color: rgba(155,110,0,0.2); }
  [data-theme="day"] .show-date span { color: rgba(26,14,0,0.4); }
  [data-theme="day"] .show-info h3 { color: #1A0E00; }
  [data-theme="day"] .members-grid { background: rgba(26,14,0,0.06); }

  @media (max-width: 768px) {
    .about-grid { grid-template-columns: 1fr; gap: 3rem; }
    .sound-grid { grid-template-columns: 1fr; }
    .show-row { grid-template-columns: 80px 1fr; }
    .show-tag { display: none; }
    .nav-links { display: none; }
    .hero-candela { font-size: 22vw; }
  }
</style>

<script type="text/babel">

// ── Cursor ──────────────────────────────────────────────────
function useCursor() {
  useEffect(() => {
    const dot = document.getElementById('cursor');
    const ring = document.getElementById('cursor-ring');
    let mx = 0, my = 0, rx = 0, ry = 0;
    const colors = ['#D4A017','#E8601C','#2A9B7A','#8B3FA8','#C2321A'];
    let colorIdx = 0;
    const onMove = e => {
      mx = e.clientX; my = e.clientY;
      dot.style.transform = `translate(${mx - 6}px, ${my - 6}px)`;
    };
    const onDown = () => {
      colorIdx = (colorIdx + 1) % colors.length;
      dot.style.background = colors[colorIdx];
      ring.style.borderColor = colors[colorIdx];
    };
    let raf;
    const loop = () => {
      rx += (mx - rx - 18) * 0.12;
      ry += (my - ry - 18) * 0.12;
      ring.style.transform = `translate(${rx}px, ${ry}px)`;
      raf = requestAnimationFrame(loop);
    };
    loop();
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mousedown', onDown);
    return () => {
      window.removeEventListener('mousemove', onMove);
      window.removeEventListener('mousedown', onDown);
      cancelAnimationFrame(raf);
    };
  }, []);
}

// ── Particles ────────────────────────────────────────────────────
function Particles() {
  const particles = Array.from({length: 28}, (_, i) => ({
    id: i,
    color: ['#D4A017','#E8601C','#2A9B7A','#8B3FA8','#C2321A'][i % 5],
    size: 2 + Math.random() * 4,
    left: Math.random() * 100,
    delay: Math.random() * 10,
    duration: 8 + Math.random() * 12,
    dx: (Math.random() - 0.5) * 200 + 'px',
  }));
  return (
    <div className="hero-particles">
      {particles.map(p => (
        <div key={p.id} className="particle" style={{
          left: `${p.left}%`, bottom: '-10px',
          width: p.size, height: p.size,
          background: p.color,
          animationDuration: `${p.duration}s`,
          animationDelay: `${p.delay}s`,
          '--dx': p.dx, opacity: 0.6,
        }} />
      ))}
    </div>
  );
}

// ── Zigzag ────────────────────────────────────────────────────
function ZigzagBand({ color = '#D4A017', flip = false }) {
  const pts = Array.from({length: 60}, (_, i) => `${i * 34},${i % 2 === 0 ? 0 : 24}`).join(' ');
  return (
    <div className="zz-runner">
      <div className="zz-runner-inner" style={{ transform: flip ? 'scaleX(-1)' : 'none' }}>
        {[0,1].map(k => (
          <svg key={k} width="2040" height="24" viewBox="0 0 2040 24" fill="none" style={{ display:'block', flexShrink:0 }}>
            <polyline points={pts} stroke={color} strokeWidth="2.5" fill="none" />
          </svg>
        ))}
      </div>
    </div>
  );
}

// ── Sun Graphic ───────────────────────────────────────────────────
function SunGraphic() {
  const rays = Array.from({length: 16}, (_, i) => {
    const angle = (i / 16) * 360, rad = angle * Math.PI / 180;
    return { x1: 130 + 110 * Math.cos(rad), y1: 130 + 110 * Math.sin(rad), x2: 130 + 130 * Math.cos(rad), y2: 130 + 130 * Math.sin(rad) };
  });
  return (
    <svg viewBox="0 0 260 260" style={{ width:'100%', height:'100%' }}>
      <defs>
        <radialGradient id="sunGrad" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stopColor="#F5D030" />
          <stop offset="40%" stopColor="#E8601C" />
          <stop offset="100%" stopColor="#C2321A" />
        </radialGradient>
        <radialGradient id="outerGrad" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stopColor="#D4A017" stopOpacity="0.15" />
          <stop offset="100%" stopColor="#D4A017" stopOpacity="0" />
        </radialGradient>
      </defs>
      <circle cx="130" cy="130" r="128" fill="url(#outerGrad)" />
      {rays.map((r, i) => <line key={i} x1={r.x1} y1={r.y1} x2={r.x2} y2={r.y2} stroke="#D4A017" strokeWidth="2.5" strokeLinecap="round" opacity="0.7" />)}
      <circle cx="130" cy="130" r="90" fill="url(#sunGrad)" />
      <circle cx="130" cy="130" r="55" fill="#F5D030" opacity="0.9" />
      <text x="130" y="148" textAnchor="middle" fontFamily="'Bebas Neue', sans-serif" fontSize="34" fill="#0D0904" letterSpacing="2">CANDELA</text>
    </svg>
  );
}

// ── Wave Player ────────────────────────────────────────────────────
function WavePlayer({ t }) {
  const [playing, setPlaying] = useState(false);
  const [progress, setProgress] = useState(0);
  const rafRef = useRef(null);
  const startRef = useRef(null);
  useEffect(() => {
    if (playing) {
      const step = ts => {
        if (!startRef.current) startRef.current = ts - progress * 180000;
        setProgress(((ts - startRef.current) % 180000) / 180000);
        rafRef.current = requestAnimationFrame(step);
      };
      rafRef.current = requestAnimationFrame(step);
    } else {
      if (rafRef.current) cancelAnimationFrame(rafRef.current);
      startRef.current = null;
    }
    return () => { if (rafRef.current) cancelAnimationFrame(rafRef.current); };
  }, [playing]);
  const bars = Array.from({length: 60}, (_, i) => 8 + Math.abs(Math.sin(i * 0.8)) * 40 + Math.abs(Math.sin(i * 1.3)) * 20);
  return (
    <div className="reveal" style={{ marginTop:'4rem', background:'var(--dark2)', padding:'2rem', display:'flex', flexDirection:'column', gap:'1.2rem' }}>
      <div style={{ display:'flex', alignItems:'center', gap:'1rem' }}>
        <button onClick={() => setPlaying(p => !p)} style={{
          width:52, height:52, borderRadius:'50%', border:'none', cursor:'none',
          background: playing ? 'linear-gradient(135deg,var(--red),var(--orange))' : 'linear-gradient(135deg,var(--gold),var(--orange))',
          color:'#0D0904', fontSize:'1.2rem', display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0,
        }}>{playing ? '⏸' : '▶'}</button>
        <div>
          <div style={{ fontFamily:"'Bebas Neue', sans-serif", fontSize:'1.1rem', letterSpacing:'0.05em', color:'var(--cream)' }}>{t.playerTitle}</div>
          <div style={{ fontSize:'0.72rem', color:'rgba(240,230,200,0.4)', letterSpacing:'0.1em' }}>
            {Math.floor(progress * 3)}:{String(Math.floor((progress * 180) % 60)).padStart(2,'0')} / 3:00
          </div>
        </div>
      </div>
      <div style={{ display:'flex', alignItems:'center', gap:'2px', height:'60px' }}>
        {bars.map((h, i) => (
          <div key={i} style={{
            flex:1, height:`${h}px`,
            background: i / bars.length < progress ? 'linear-gradient(180deg,var(--gold),var(--orange))' : 'rgba(240,230,200,0.12)',
            borderRadius:'2px', transition:'background 0.1s',
          }} />
        ))}
      </div>
    </div>
  );
}

              <span key={s} style={{ fontSize:'0.75rem', letterSpacing:'0.12em', textTransform:'uppercase', color:'rgba(240,230,200,0.4)', cursor:'none', transition:'color 0.2s' }}
                onMouseEnter={e => e.target.style.color = 'var(--gold)'}
                onMouseLeave={e => e.target.style.color = 'rgba(240,230,200,0.4)'}>{s}</span>
            ))}
          </div>
        </div>
      </div>
    </section>
  );
}

// ── Footer ────────────────────────────────────────────────────────
function Footer({ t }) {
  return (
    <>
      <div style={{ background:'var(--bg)' }}>
        <ZigzagBand color="#D4A017" />
        <ZigzagBand color="#C2321A" flip />
        <ZigzagBand color="#2A9B7A" />
      </div>
      <footer>
        <div className="footer-logo"><span>Los</span>CANDELA</div>
        <p>{t.footerSub} · {new Date().getFullYear()}</p>
      </footer>
    </>
  );
}

// ── App ────────────────────────────────────────────────────────────
function App() {
  useCursor();
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const theme = tweaks.theme;
  const lang = tweaks.lang;
  const t = COPY[lang];

  useEffect(() => {
    document.documentElement.setAttribute('data-theme', theme);
  }, [theme]);

  useEffect(() => {
    const observer = new IntersectionObserver(
      entries => entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); }),
      { threshold: 0.12 }
    );
    document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
    return () => observer.disconnect();
  }, [lang]);

  return (
    <>
      <Nav t={t} />
      <Hero t={t} />
      <About t={t} />
      <Shows t={t} lang={lang} />
      <Sound t={t} />
      <Band t={t} lang={lang} />
      <Contact t={t} />
      <Footer t={t} />

      <TweaksPanel>
        <TweakSection label="Tema / Theme">
          <TweakRadio label="Modo" value={theme} options={['night','day']} onChange={v => setTweak('theme', v)} />
        </TweakSection>
        <TweakSection label="Idioma / Language">
          <TweakRadio label="Idioma" value={lang} options={['es','en']} onChange={v => setTweak('lang', v)} />
        </TweakSection>
      </TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
